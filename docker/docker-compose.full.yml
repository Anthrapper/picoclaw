services:
  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.heavy
    image: picoclaw-heavy:latest
    container_name: picoclaw-launcher-full
    restart: unless-stopped
    ports:
      - "${PICOCLAW_LAUNCHER_PORT:-18800}:18800"
      - "${PICOCLAW_GATEWAY_PORT:-18790}:18790"
    volumes:
      - picoclaw-data:/root/.picoclaw
      - picoclaw-npm-cache:/root/.npm
      - playwright-browsers:/opt/playwright-browsers
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
      - TZ=${TZ:-UTC}
      - PLAYWRIGHT_BROWSERS_PATH=/opt/playwright-browsers
    entrypoint: ["picoclaw-launcher"]
    command: ["-public", "-no-browser"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.heavy
    image: picoclaw-heavy:latest
    container_name: picoclaw-agent-full
    profiles:
      - agent
    volumes:
      - picoclaw-data:/root/.picoclaw
      - picoclaw-npm-cache:/root/.npm
      - playwright-browsers:/opt/playwright-browsers
    environment:
      - TZ=${TZ:-UTC}
      - PLAYWRIGHT_BROWSERS_PATH=/opt/playwright-browsers
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.heavy
    image: picoclaw-heavy:latest
    container_name: picoclaw-gateway-full
    profiles:
      - gateway
    restart: unless-stopped
    ports:
      - "${PICOCLAW_GATEWAY_PORT:-18790}:18790"
    volumes:
      - picoclaw-data:/root/.picoclaw
      - picoclaw-npm-cache:/root/.npm
      - playwright-browsers:/opt/playwright-browsers
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
      - PICOCLAW_LOG_LEVEL=${PICOCLAW_LOG_LEVEL:-warn}
      - TZ=${TZ:-UTC}
      - PLAYWRIGHT_BROWSERS_PATH=/opt/playwright-browsers
    command: ["gateway", "-E"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  picoclaw-data:
  picoclaw-npm-cache:
  playwright-browsers:
